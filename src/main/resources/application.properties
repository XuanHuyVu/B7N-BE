server.port=8080
server.servlet.context-path=/api
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

spring.datasource.url=${B7N_DATASOURCE_URL}
spring.datasource.username=${B7N_DATASOURCE_USERNAME}
spring.datasource.password=${B7N_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.web=INFO

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.timeout=3000

cors.allowed-origins= ${CORS_ALLOWED_ORIGINS}
cors.allowed-methods= ${CORS_ALLOWED_METHODS}
cors.allowed-headers= ${CORS_ALLOWED_HEADERS}
cors.allow-credentials= ${CORS_ALLOW_CREDENTIALS}
cors.max-age= ${CORS_MAX_AGE}

